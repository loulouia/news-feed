name: Update Feeds

on:
  schedule:
    - cron: '0 10 * * *'
  
  workflow_dispatch:
  
  push:
    branches: [main]
    paths:
      - 'feeds.json'
      - 'fetch_feeds.py'

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch feeds
        run: python fetch_feeds.py
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Atualização automática dos feeds - $(date +'%Y-%m-%d %H:%M')"
          git push
